
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maral — Premium Linen Wear</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f8f5f0;
      color: #0f0f0f;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 1rem 3rem;
      background: rgba(15,15,15,0.9);
      display: flex;
      justify-content: space-between;
      color: white;
      z-index: 100;
    }
    nav a {
      color: white;
      text-decoration: none;
      letter-spacing: 0.15em;
      font-size: 0.75rem;
    }

    /* HERO */
    .hero {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }
    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.65));
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
    }
    .overlay h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 7vw, 6rem);
    }

    /* COLLECTION */
    section {
      padding: 5rem 3rem;
    }
    h2 {
      font-family: 'Playfair Display', serif;
      text-align: center;
      margin-bottom: 3rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
    }
    .card {
      position: relative;
      overflow: hidden;
    }
    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .5s;
    }
    .card:hover img {
      transform: scale(1.05);
    }
    .label {
      position: absolute;
      bottom: 0;
      background: rgba(15,15,15,0.6);
      color: white;
      padding: 1rem;
      width: 100%;
    }

    footer {
      background: #0f0f0f;
      color: #aaa;
      text-align: center;
      padding: 2rem;
      font-size: 0.75rem;
    }
  </style>
</head>

<body>

<nav>
  <strong>Maral</strong>
  <span>Linen Collections</span>
</nav>

<div class="hero">
  <img src="images/hero.jpg">
  <div class="overlay">
    <div>
      <h1>Maral</h1>
      <p>Premium Linen · Men & Women</p>
    </div>
  </div>
</div>

<section>
  <h2>Our Collection</h2>

  <div class="grid">
    <div class="card">
      <img src="images/womens-linen-1.jpg">
      <div class="label">Women’s Linen Shirts</div>
    </div>

    <div class="card">
      <img src="images/trousers-1.jpg">
      <div class="label">Linen Trousers</div>
    </div>

    <div class="card">
      <img src="images/mens-shirts-1.jpg">
      <div class="label">Men’s Linen Shirts</div>
    </div>

    <div class="card">
      <img src="images/storefront.jpg">
      <div class="label">Visit Our Store</div>
    </div>
  </div>
</section>

<footer>
  © 2026 Maral · Crafted with Care
</footer>

</body>
</html>
